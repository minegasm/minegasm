name: Build and test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Build and test every variant
        run: |
          chmod +x gradlew
          ./gradlew chiseledBuild --no-daemon --stacktrace --warning-mode all

      - name: Verify packaged artifacts
        run: |
          shopt -s nullglob
          artifacts=(versions/*/build/libs/minegasm-*.jar)
          if [ "${#artifacts[@]}" -lt 1 ]; then
            echo "ERROR: no minegasm-*.jar found under versions/*/build/libs/" >&2
            exit 1
          fi

          for artifact in "${artifacts[@]}"; do
            echo "Verifying $artifact"
            entries="$(jar tf "$artifact")"
            echo "$entries" | grep -q '^META-INF/LICENSE-minegasm$' \
              || { echo "ERROR: $artifact is missing META-INF/LICENSE-minegasm" >&2; exit 1; }
            # Jar-in-jar bundling format differs by loader: Forge/NeoForge (Loom) writes a
            # jarjar/metadata.json manifest; Fabric records bundled jars in fabric.mod.json's "jars"
            # array instead. Both still place the actual nested jars under META-INF/jars/.
            case "$artifact" in
              *-fabric.jar)
                unzip -p "$artifact" fabric.mod.json | grep -q '"jars"' \
                  || { echo "ERROR: $artifact is missing a fabric.mod.json \"jars\" entry" >&2; exit 1; }
                ;;
              *)
                echo "$entries" | grep -q '^META-INF/jarjar/metadata.json$' \
                  || { echo "ERROR: $artifact is missing META-INF/jarjar/metadata.json" >&2; exit 1; }
                ;;
            esac
            echo "$entries" | grep -qE '^META-INF/jars/buttplug4j-[0-9].*\.jar$' \
              || { echo "ERROR: $artifact is missing a bundled buttplug4j jar. Actual META-INF/jars/ entries:"; echo "$entries" | grep '^META-INF/jars/' >&2; exit 1; }
          done

          mkdir -p dist
          cp "${artifacts[@]}" dist/

      - name: Upload built jars
        uses: actions/upload-artifact@v7
        with:
          name: minegasm-jars-${{ github.run_id }}
          path: dist/
          if-no-files-found: error
