name: Build and test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build and test every variant
        run: |
          chmod +x gradlew
          ./gradlew chiseledBuild --no-daemon --stacktrace --warning-mode all

      - name: Verify packaged artifacts
        run: |
          shopt -s nullglob
          artifacts=(versions/*/build/libs/minegasm-*.jar)
          test "${#artifacts[@]}" -ge 1

          for artifact in "${artifacts[@]}"; do
            jar tf "$artifact" | grep -q '^META-INF/LICENSE-minegasm$'
            jar tf "$artifact" | grep -q '^META-INF/jarjar/metadata.json$'
            jar tf "$artifact" | grep -qE '^META-INF/jars/gson-[0-9].*\.jar$'
            jar tf "$artifact" | grep -qE '^META-INF/jars/buttplug4j-[0-9].*\.jar$'
          done
