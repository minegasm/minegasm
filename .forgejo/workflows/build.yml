name: Build and release

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - group: 26.2
            variants: 26.2-neoforge 26.2-fabric 26.2-forge
          - group: 26.1.2
            variants: 26.1.2-neoforge 26.1.2-fabric 26.1.2-forge
          - group: 1.21.1
            variants: 1.21.1-neoforge 1.21.1-fabric 1.21.1-forge
          - group: 1.20.1
            variants: 1.20.1-fabric 1.20.1-forge
          - group: 1.19.2
            variants: 1.19.2-fabric 1.19.2-forge
    runs-on: codeberg-medium-lazy
    steps:
      - name: Check out source
        env:
          FORGE_URL: ${{ forge.server_url }}
          REPOSITORY: ${{ forge.repository }}
          COMMIT_SHA: ${{ forge.sha }}
        run: |
          git clone --no-checkout --filter=blob:none "$FORGE_URL/$REPOSITORY.git" .
          git checkout --detach "$COMMIT_SHA"

      - name: Set up JDK 25
        run: |
          curl -fsSL -o /tmp/jdk.tar.gz "https://api.adoptium.net/v3/binary/latest/25/ga/linux/x64/jdk/hotspot/normal/eclipse"
          mkdir -p "$HOME/jdk-25"
          tar -xzf /tmp/jdk.tar.gz -C "$HOME/jdk-25" --strip-components=1
          echo "JAVA_HOME=$HOME/jdk-25" >> "$GITHUB_ENV"
          echo "$HOME/jdk-25/bin" >> "$GITHUB_PATH"

      - name: Build and test this Minecraft line's variants
        env:
          VARIANTS: ${{ matrix.variants }}
        run: |
          chmod +x gradlew
          tasks=()
          for v in $VARIANTS; do tasks+=(":$v:build"); done
          ./gradlew "${tasks[@]}" --no-daemon --configure-on-demand --stacktrace --warning-mode all

      - name: Verify and stage this group's artifacts
        env:
          VARIANTS: ${{ matrix.variants }}
        run: |
          shopt -s nullglob
          mkdir -p dist
          cp versions/*/build/libs/minegasm-*.jar dist/

          expected="$(echo "$VARIANTS" | wc -w)"
          actual="$(find dist -maxdepth 1 -name '*.jar' -type f | wc -l)"
          if [ "$actual" -lt "$expected" ]; then
            echo "ERROR: expected $expected jar(s) for group ${{ matrix.group }}, found $actual under versions/*/build/libs/" >&2
            exit 1
          fi

          for artifact in dist/*.jar; do
            echo "Verifying $artifact"
            entries="$(jar tf "$artifact")"
            echo "$entries" | grep -q '^META-INF/LICENSE-minegasm$' \
              || { echo "ERROR: $artifact is missing META-INF/LICENSE-minegasm" >&2; exit 1; }
            # Jar-in-jar bundling format differs by loader: Forge/NeoForge (Loom) writes a
            # jarjar/metadata.json manifest; Fabric records bundled jars in fabric.mod.json's "jars"
            # array instead. Both still place the actual nested jars under META-INF/jars/.
            case "$artifact" in
              *-fabric.jar)
                unzip -p "$artifact" fabric.mod.json | grep -q '"jars"' \
                  || { echo "ERROR: $artifact is missing a fabric.mod.json \"jars\" entry" >&2; exit 1; }
                ;;
              *)
                echo "$entries" | grep -q '^META-INF/jarjar/metadata.json$' \
                  || { echo "ERROR: $artifact is missing META-INF/jarjar/metadata.json" >&2; exit 1; }
                ;;
            esac
            echo "$entries" | grep -qE '^META-INF/jars/buttplug4j-[0-9].*\.jar$' \
              || { echo "ERROR: $artifact is missing a bundled buttplug4j jar. Actual META-INF/jars/ entries:"; echo "$entries" | grep '^META-INF/jars/' >&2; exit 1; }
          done

      - name: Upload built jars
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: jars-${{ matrix.group }}
          path: dist/*.jar

  release:
    needs: build
    if: forge.ref_type == 'tag'
    runs-on: codeberg-medium-lazy
    steps:
      - name: Download all built jars
        uses: https://code.forgejo.org/forgejo/download-artifact@v4
        with:
          pattern: jars-*
          path: dist
          merge-multiple: true

      - name: Check tag matches project version
        env:
          REF_TYPE: ${{ forge.ref_type }}
          TAG_NAME: ${{ forge.ref_name }}
        run: |
          count="$(find dist -maxdepth 1 -name '*.jar' -type f | wc -l)"
          if [ "$count" -lt 1 ]; then
            echo "ERROR: no jars were collected from the build jobs" >&2
            exit 1
          fi

          first_jar="$(find dist -maxdepth 1 -name 'minegasm-*.jar' -type f | sort | head -1)"
          version="$(basename "$first_jar" | sed -E 's/^minegasm-([^+]+)\+.*$/\1/')"
          if [ "$REF_TYPE" = tag ] && [ "$TAG_NAME" != "v$version" ]; then
            echo "Tag $TAG_NAME does not match project version $version" >&2
            exit 1
          fi

          cd dist
          sha256sum *.jar > SHA256SUMS

      - name: Publish Codeberg beta release
        if: forge.ref_type == 'tag' && contains(forge.ref_name, '-beta.')
        env:
          FORGE_URL: ${{ forge.server_url }}
          REPOSITORY: ${{ forge.repository }}
          TAG_NAME: ${{ forge.ref_name }}
          RELEASE_TOKEN: ${{ forge.token }}
        run: |
          api="$FORGE_URL/api/v1/repos/$REPOSITORY"
          payload="$(jq -n \
            --arg tag "$TAG_NAME" \
            --arg name "$TAG_NAME" \
            '{tag_name:$tag,name:$name,body:"Automated Minegasm beta build. See the changelog and testing documentation for details.",draft:false,prerelease:true}')"
          release="$(curl --fail-with-body --silent --show-error \
            -H "Authorization: token $RELEASE_TOKEN" \
            -H 'Content-Type: application/json' \
            --data "$payload" "$api/releases")"
          release_id="$(printf '%s' "$release" | jq -er '.id')"

          for artifact in dist/*.jar dist/SHA256SUMS; do
            name="$(basename "$artifact")"
            encoded="$(printf '%s' "$name" | jq -sRr @uri)"
            curl --fail-with-body --silent --show-error \
              -H "Authorization: token $RELEASE_TOKEN" \
              -F "attachment=@$artifact" \
              "$api/releases/$release_id/assets?name=$encoded" >/dev/null
          done
